<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRE EM CONTATO - MosquiTrap</title>
    <meta name="description" content="Entre em contato com a equipe do projeto MosquiTrap.">
    <link rel="stylesheet" href="css/CONTATO.css">
</head>

<body>
    <header>

        <img class="logo" src="fotis/logo.png" alt="Logo MosquiTrap">

        <nav>

            <ul>

                <li><a href="index.html">Home</a></li>
                <li><a href="COMO-FUNCIONA.html">Como Funciona</a></li>
                <li><a href="BENEFICIOS.html">Benefícios</a></li>
                <li><a href="CONTATO.html">Contato</a></li>

            </ul>

        </nav>

    </header>
    <main>
        <section class="secao-contato">
            <h1>Fale Conosco</h1>
            <p>Tem alguma dúvida ou sugestão sobre a MosquiTrap? Envie uma mensagem para nossa equipe!</p>

            <form id="form-contato" novalidate>
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                    <span class="erro" id="erro-nome"></span>
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="Digite seu melhor e-mail">
                    <span class="erro" id="erro-email"></span>
                </div>

                <div class="campo">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>
                    <span class="erro" id="erro-mensagem"></span>
                </div>

                <button type="submit" id="btn-enviar">Enviar Mensagem</button>
            </form>
            
            <div id="mensagem-sucesso" class="sucesso-oculto">
                🎉 Mensagem enviada com sucesso! Entraremos em contato em breve.
            </div>
        </section>
    </main>
    <script src="js/JAVASCRIPT-CONTATO.JS"></script>


</body>

</html>
